name: Build Windows POS installer

on:
  workflow_dispatch:

jobs:
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable long paths (Windows)
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Versions
        run: node -v && npm -v

      - name: Install root dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Bundle backend for Electron (pos-app)
        run: npm run bundle-backend --workspace pos-app

      - name: Build POS frontend (Vite)
        run: npm run build --workspace pos-app

      # İç içe node_modules klasörlerini silmek (junction) Windows'ta hoisted app-builder-bin'i de silebiliyor.
      # Tek sürüm: package.json overrides + builder-util ile uyumlu 5.0.0-alpha.10.
      - name: Verify app-builder.exe exists
        shell: pwsh
        run: |
          npm ls app-builder-bin --all
          $exe = node -e "console.log(require('path').resolve(require('app-builder-bin').appBuilderPath))"
          Write-Host "Expected app-builder: $exe"
          $dir = Split-Path $exe -Parent
          if (Test-Path $dir) { Get-ChildItem $dir }
          if (-not (Test-Path $exe)) {
            Get-ChildItem -Recurse node_modules/app-builder-bin -ErrorAction SilentlyContinue | Select-Object -First 60 FullName
            throw "app-builder.exe missing: $exe"
          }

      - name: Electron Builder (Windows NSIS)
        shell: pwsh
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CI: "false"
        run: |
          $exe = node -e "console.log(require('path').resolve(require('app-builder-bin').appBuilderPath))"
          if (-not (Test-Path $exe)) { throw "app-builder.exe missing before build: $exe" }
          $env:CUSTOM_APP_BUILDER_PATH = $exe
          Write-Host "CUSTOM_APP_BUILDER_PATH=$env:CUSTOM_APP_BUILDER_PATH"
          npx electron-builder --projectDir pos-app

      - name: List release output (debug)
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "pos-app/release") {
            Get-ChildItem -Recurse "pos-app/release" | Select-Object FullName, Length
          } else {
            Write-Host "pos-app/release yok."
          }

      - name: Upload release folder
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: turadisyon-pos-windows-release
          path: pos-app/release/**
          if-no-files-found: error
