name: Build Windows POS installer

on:
  workflow_dispatch:

jobs:
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable long paths (Windows)
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Versions
        run: node -v && npm -v

      - name: Install root dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Bundle backend for Electron (pos-app)
        run: npm run bundle-backend --workspace pos-app

      - name: Build POS frontend (Vite)
        run: npm run build --workspace pos-app

      # app-builder-bin bazen workspace kurulumunda win/x64/app-builder.exe oluşturmuyor; script'leri zorla çalıştır
      - name: Ensure app-builder-bin (Windows exe)
        shell: pwsh
        run: |
          npm install app-builder-bin@5.0.0-alpha.10 --no-save --foreground-scripts
          $exe = "node_modules/app-builder-bin/win/x64/app-builder.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "app-builder.exe yok, klasör:"
            Get-ChildItem -Recurse node_modules/app-builder-bin -ErrorAction SilentlyContinue | Select-Object -First 40 FullName
            throw "app-builder.exe bulunamadi: $exe"
          }
          Write-Host "OK: $exe"

      - name: Electron Builder (Windows NSIS)
        working-directory: pos-app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CI: "false"
        run: npx electron-builder

      - name: List release output (debug)
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "pos-app/release") {
            Get-ChildItem -Recurse "pos-app/release" | Select-Object FullName, Length
          } else {
            Write-Host "pos-app/release yok."
          }

      - name: Upload release folder
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: turadisyon-pos-windows-release
          path: pos-app/release/**
          if-no-files-found: error
