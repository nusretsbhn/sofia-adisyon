name: Build Windows POS installer

on:
  workflow_dispatch:

jobs:
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable long paths (Windows)
        shell: pwsh
        run: git config --global core.longpaths true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Versions
        run: node -v && npm -v

      - name: Install root dependencies
        run: npm install --legacy-peer-deps --no-audit --no-fund

      - name: Bundle backend for Electron (pos-app)
        run: npm run bundle-backend --workspace pos-app

      - name: Build POS frontend (Vite)
        run: npm run build --workspace pos-app

      # İç içe app-builder-bin kopyaları bazen win ikilisini taşımıyor; electron-builder yanlış paketi resolve ediyor
      - name: Fix app-builder-bin (single hoisted copy + Windows exe)
        shell: pwsh
        run: |
          $nested = @(
            "node_modules/electron-builder/node_modules/app-builder-bin",
            "node_modules/app-builder-lib/node_modules/app-builder-bin",
            "node_modules/builder-util/node_modules/app-builder-bin",
            "node_modules/dmg-builder/node_modules/app-builder-bin",
            "pos-app/node_modules/electron-builder/node_modules/app-builder-bin",
            "pos-app/node_modules/app-builder-lib/node_modules/app-builder-bin",
            "pos-app/node_modules/builder-util/node_modules/app-builder-bin",
            "pos-app/node_modules/app-builder-bin"
          )
          foreach ($p in $nested) {
            if (Test-Path $p) {
              Write-Host "Removing nested: $p"
              Remove-Item -Recurse -Force $p
            }
          }
          npm install app-builder-bin@5.0.0-alpha.10 --no-save --foreground-scripts
          $resolved = node -e "console.log(require('app-builder-bin').appBuilderPath)"
          Write-Host "Resolved app-builder path: $resolved"
          if (-not (Test-Path $resolved)) {
            Get-ChildItem -Recurse node_modules/app-builder-bin -ErrorAction SilentlyContinue | Select-Object -First 50 FullName
            throw "app-builder binary missing: $resolved"
          }

      - name: Electron Builder (Windows NSIS)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          CI: "false"
        # pos-app içinden çalıştırma: require('app-builder-bin') yanlış kopyayı seçebiliyor. Kökten --projectDir kullan.
        run: npx electron-builder --projectDir pos-app

      - name: List release output (debug)
        if: always()
        shell: pwsh
        run: |
          if (Test-Path "pos-app/release") {
            Get-ChildItem -Recurse "pos-app/release" | Select-Object FullName, Length
          } else {
            Write-Host "pos-app/release yok."
          }

      - name: Upload release folder
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: turadisyon-pos-windows-release
          path: pos-app/release/**
          if-no-files-found: error
