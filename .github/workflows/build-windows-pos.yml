# Windows installer: GitHub’ın Windows runner’ında app-builder.exe sık ENOENT/Defender ile kırılıyor.
# electron-userland resmi Wine imajında derleme — Windows ikilisi Wine altında, app-builder.exe gerekmez.
# https://www.electron.build/multi-platform-build

name: Build Windows POS installer

on:
  workflow_dispatch:

jobs:
  windows-installer:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build NSIS on Linux (Docker Wine)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: |
          set -euo pipefail
          docker run --rm \
            -e CSC_IDENTITY_AUTO_DISCOVERY \
            -v "$GITHUB_WORKSPACE:/project" \
            -w /project \
            electronuserland/builder:20-wine-mono \
            /bin/bash -lc "set -euo pipefail
              node -v && npm -v
              npm install --legacy-peer-deps --no-audit --no-fund
              npm run bundle-backend --workspace pos-app
              npm run build --workspace pos-app
              npx electron-builder --projectDir pos-app --win"

      - name: Fix workspace permissions (Docker root files)
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" "$GITHUB_WORKSPACE" || true

      - name: List release output (debug)
        if: always()
        run: |
          if [ -d pos-app/release ]; then find pos-app/release -type f -printf '%s %p\n' | head -40; else echo 'pos-app/release yok'; fi

      - name: Upload release folder
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: turadisyon-pos-windows-release
          path: pos-app/release/**
          if-no-files-found: error
